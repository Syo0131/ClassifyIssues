<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- White rounded background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#ffffff"/>
  <!-- Ticket body -->
  <g transform="translate(256, 256)">
    <!-- Main ticket rectangle -->
    <rect x="-140" y="-100" width="280" height="200" rx="20" fill="#2563eb"/>
    <!-- Left notch -->
    <circle cx="-140" cy="0" r="28" fill="#ffffff"/>
    <!-- Right notch -->
    <circle cx="140" cy="0" r="28" fill="#ffffff"/>
    <!-- Checkmark -->
    <polyline points="-35,10 -10,40 45,-25" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
